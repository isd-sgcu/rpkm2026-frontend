name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        if: github.ref_name == 'main'
        run: bun run typecheck

      - name: Lint
        if: github.ref_name == 'main'
        run: bun run lint

      - name: Check formatting
        if: github.ref_name == 'main'
        run: bun run format:check

      - name: Build
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
        run: bun run build

      # --- MAIN BRANCH -> rpkm2026-frontend (www.rpkm2026.com) ---
      - name: Deploy to Production
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: bun

      # --- DEV BRANCH -> rpkm2026-frontend-staging (staging.rpkm2026.com) ---
      - name: Deploy to Staging
        if: github.ref_name == 'dev'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          packageManager: bun

      - name: Print Deployed URL
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "🚀 Production deployed: https://www.rpkm2026.com"
          else
            echo "🚀 Staging deployed: https://staging.rpkm2026.com"
          fi
