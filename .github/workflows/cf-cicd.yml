name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        if: github.ref_name != 'dev'
        run: bun run typecheck

      - name: Lint
        if: github.ref_name != 'dev'
        run: bun run lint

      - name: Check formatting
        if: github.ref_name != 'dev'
        run: bun run format:check

      - name: Build
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
        run: bun run build

      - name: Formulate Deploy Message
        id: vars
        run: |
          # Safely clean and format commit message
          msg=$(git log -1 --pretty=%s | tr -d '"\n\r')
          if [ -z "$msg" ]; then
            msg="Manual deploy by ${{ github.actor }}"
          fi
          echo "commit_msg=$msg" >> "$GITHUB_OUTPUT"

      # --- STEP FOR BOTH BRANCHES ---
      # Both branches upload code to the exact same 'firstdate2026-frontend' registry
      - name: Upload Version to Cloudflare
        id: upload
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            versions upload
            --message "${{ steps.vars.outputs.commit_msg }}"
            --tag "${{ github.actor }}-${{ github.sha }}"
            --preview-alias "${{ github.ref_name }}-preview"
          packageManager: bun

      # --- DEV BRANCH ONLY ---
      # Prints out the preview link generated explicitly inside rpkm2026-frontend
      - name: Output Dev Preview Link
        if: github.ref_name == 'dev'
        run: |
          echo "✨ Code uploaded to rpkm2026-frontend!"
          echo "🔗 Preview URL is: https://dev-rpkm2026-frontend.<subdomain>.workers.dev"

      # --- MAIN BRANCH ONLY ---
      # Only the main branch executes the full production deployment sequence to the custom domain
      - name: Promote to Production (Main Branch Only)
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            versions deploy
            --version-tag "${{ github.actor }}-${{ github.sha }}"
            --yes
          packageManager: bun
